name: thai_yu
description: 泰嶼 — Thai reading analysis tool for Chinese speakers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend (kept for future expansion)
  supabase_flutter: ^2.8.2

  # Data modeling
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP & API
  http: ^1.3.0

  # Local cache (SQLite)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Secure storage (API key)
  flutter_secure_storage: ^9.2.4

  # TTS (Thai pronunciation)
  flutter_tts: ^4.2.0

  # Crypto (SHA-256 for cache keys)
  crypto: ^3.0.6

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  gap: ^3.0.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.23.1

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
